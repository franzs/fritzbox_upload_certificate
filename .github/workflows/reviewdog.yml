name: reviewdog
on: [pull_request]
jobs:
  shellcheck:
    name: runner / reviewdog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shfmt
        uses: reviewdog/action-shfmt@v1
        with:
          shfmt_flags: -i 2 -ci
      - name: shellcheck
        uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-review
